services:
  postgres:
    image: postgres:16
    container_name: delegate-postgres
    environment:
      POSTGRES_DB: delegate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delegate"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  jira-mock:
    image: wiremock/wiremock:3.6.0
    container_name: delegate-jira-mock
    profiles: ["integration-mocks"]
    ports:
      - "18081:8080"
    volumes:
      - ./testdata/jira/wiremock:/home/wiremock
    command: ["--verbose"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/__admin/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  gong-mock:
